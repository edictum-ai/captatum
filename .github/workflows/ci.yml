name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned by commit SHA (supply-chain hardening); versions + dates in
      # docs/dependency-ledger.md.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check      # syntax + 250-line limit + typecheck
      - run: pnpm test           # node --test test/*.test.ts (unit suite; no browser)

  fixtures:
    runs-on: ubuntu-latest
    steps:
      # The deterministic fixture suite exercises captatum's full fetch → render →
      # extract pipeline against self-hosted pages (real Playwright Chromium). It
      # auto-skips without a browser, so a fail-fast launch check guarantees it
      # actually RUNS here rather than silently skipping on a misconfigured runner.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Verify Chromium launches (no silent skip)
        run: node --input-type=module -e "const {chromium}=await import('playwright'); const b=await chromium.launch(); await b.close();"
      - run: node --no-warnings --test test/integration/fixtures.test.ts

  # Engineering OS artifact-chain guard (freeze-hash · mixed-diff · stage-artifact).
  # https://github.com/acartag7/engineering-os — pinned by commit SHA like every other
  # action here. Own checkout with full history (merge-base needs it). PR-only: on a
  # push to main there is no base branch to diff against, so the guard would have no
  # merge-base and error; it only has meaning gating a PR.
  process-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: acartag7/engineering-os/process-guard@b483fa418ffa8122588fdfa87c36f40f6908c06f
        with:
          base-ref: origin/${{ github.base_ref }}
          src-paths: src/
          contract-paths: docs/contracts.md
