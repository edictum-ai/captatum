# Railway service config for the captatum gateway (hosted flavor).
# `railway.toml` covers build/deploy knobs; the service IMAGE and the persistent
# VOLUME are set in the Railway dashboard (or via the `railway` CLI) — see
# deploy/railway.md.
#
# Storage: the default SQLite store needs a persistent volume mounted at /data.
#   Dashboard: Settings → Volumes → add a volume at /data.
#   Env: CAPTATUM_SQLITE_PATH=/data/captatum.sqlite
#
# Tier-3 (JS rendering): the browser sidecar must share the gateway's network
# namespace (loopback CDP — the renderer HARD-REJECTS non-loopback CDP hosts).
# Railway services do NOT share a namespace, so a separate browser service CANNOT
# be reached on 127.0.0.1. Options: (a) leave allowRender off (default — no
# browser); (b) a combined single image bundling gateway + Chromium; or (c) deploy
# on EC2 / Mac Mini where the network_mode: service:gateway sidecar pattern works.
# See deploy/railway.md for the full Tier-3 tradeoff.

[deploy]
startCommand = "node --no-warnings src/server.ts"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
