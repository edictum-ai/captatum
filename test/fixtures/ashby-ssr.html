    <script type="application/ld+json">{"@context":"https://schema.org/","@type":"JobPosting","title":"Senior Cloud Infrastructure Engineer","description":"<h1><strong>About Langfuse</strong></h1><p style=\"min-height:1.5em\">Open Source LLM Engineering Platform that helps teams build useful AI applications via tracing, evaluation, and prompt management (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/0/82383757e54352130f65066e1b2fc4708aacab7897561bcb8000fe4c8a9c6a21?cache_buster=1761124921\"><u>mission</u></a>, <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/1/b9fba3a93b6ffcc0f99ecda62767a17cc437fe8fe0b16181d1c43c1391212e3d?cache_buster=1761124921\"><u>product</u></a>). We are now part of ClickHouse.</p><p style=\"min-height:1.5em\">We're building the \"Datadog\" of this category; model capabilities continue to improve, but building useful applications is really hard, both in startups and enterprises.</p><p style=\"min-height:1.5em\">Largest open source solution in this category: trusted by 19 of the Fortune 50, &gt;2k customers, &gt;26M monthly SDK downloads, &gt;6M Docker pulls.</p><p style=\"min-height:1.5em\">We joined ClickHouse in January 2026 because LLM observability is fundamentally a data problem and Langfuse already ran on ClickHouse. Together we can move faster on product while staying true to open source and self-hosting, and join forces on GTM and sales to accelerate revenue.</p><p style=\"min-height:1.5em\">Previously backed by Y Combinator, Lightspeed, and General Catalyst.</p><p style=\"min-height:1.5em\">We're a small, engineering-heavy, and experienced team in Berlin and San Francisco. We are also hiring for engineering in EU timezones and expect one week per month in our Berlin office (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/principles\"><u>how we work</u></a>).</p><p style=\"min-height:1.5em\"></p><h2><strong>Why Cloud Infrastructure at Langfuse</strong></h2><p style=\"min-height:1.5em\"><strong>Your work will keep Langfuse running — everywhere.</strong></p><p style=\"min-height:1.5em\">Langfuse processes over a billion trace events per month. When a Fortune 50 company relies on Langfuse in production, they're relying on the infrastructure you operate. You'll own uptime, performance, and cost efficiency across our entire cloud footprint — and you'll make sure every self-hosted deployment runs just as smoothly.</p><p style=\"min-height:1.5em\">You'll operate Langfuse Cloud on AWS ECS Fargate and ClickHouse Cloud, with Datadog as the observability backbone. You'll also own our public self-hosted infrastructure — including our Helm chart, Docker Compose setup, and everything in between — so that teams from startups to enterprises can run Langfuse on their own terms.</p><p style=\"min-height:1.5em\">This isn't a \"maintain what exists\" role. We're scaling fast, and you'll be the person who makes sure the infrastructure grows ahead of demand — not behind it.</p><p style=\"min-height:1.5em\">Langfuse is now part of ClickHouse, which means the team behind the database at the core of our stack is one channel away. Few infrastructure roles give you that kind of direct access to the people who build your most critical dependency.</p><p style=\"min-height:1.5em\"></p><h2><strong>You will grow at Langfuse by</strong></h2><p style=\"min-height:1.5em\"><strong>Own Langfuse Cloud operations:</strong> You'll run our production environments on AWS ECS Fargate and ClickHouse Cloud. You'll manage deployments, autoscaling, capacity planning, and cost optimization — making sure we stay fast and affordable as traffic scales.</p><p style=\"min-height:1.5em\"><strong>Build world-class observability:</strong> You'll own our Datadog setup end to end — dashboards, alerts, and SLOs. When something degrades, you'll ensure we know before our customers do. You'll build the monitoring culture that lets the whole team ship with confidence.</p><p style=\"min-height:1.5em\"><strong>Make self-hosting effortless:</strong> Thousands of teams run Langfuse on their own infrastructure. You'll own and evolve our Helm chart, Docker Compose configuration, and deployment documentation. You'll turn \"works on my machine\" into \"works on every machine\" — from a single-node setup to a multi-region enterprise deployment.</p><p style=\"min-height:1.5em\"><strong>Automate everything:</strong> CI/CD pipelines, infrastructure-as-code, automated scaling, zero-downtime deployments. You'll replace manual processes with automation that makes the team faster and the platform more reliable.</p><p style=\"min-height:1.5em\"><strong>Scale for what's next:</strong> We're growing fast and new product directions — like complex long-running agent observability and real-time evaluation — push the infrastructure in new ways. You'll be thinking ahead about what breaks at 10x scale and building the foundation before we get there. 10x is always just one quarter away here at Langfuse.</p><p style=\"min-height:1.5em\"><strong>Harden security and compliance:</strong> As more enterprises adopt Langfuse, you'll help ensure our cloud and self-hosted deployments meet the security and compliance bar that large organizations require.</p><p style=\"min-height:1.5em\"></p><h2><strong>What we're looking for</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Strong infrastructure or SRE engineer who gets excited about running systems at scale and making them better every day</p></li><li><p style=\"min-height:1.5em\">Experience operating production workloads on AWS (ECS/Fargate, networking, IAM, S3, etc.) or on comparable hyperscale vendors.</p></li><li><p style=\"min-height:1.5em\">Comfortable with container orchestration — Kubernetes and/or ECS, Helm charts, Docker</p></li><li><p style=\"min-height:1.5em\">Experience with infrastructure-as-code (Terraform, Pulumi, CloudFormation, or similar)</p></li><li><p style=\"min-height:1.5em\">Strong monitoring and observability instincts — you've built dashboards and alerts that actually caught problems (Datadog experience is a plus)</p></li><li><p style=\"min-height:1.5em\">You organize yourself. You have strong opinions about reliability, automation, and how to ship infrastructure changes safely</p></li><li><p style=\"min-height:1.5em\">Interest in open source software and genuine enjoyment helping users debug their self-hosted deployments</p></li><li><p style=\"min-height:1.5em\">Thrives in a small, accountable team where your output is visible and matters</p></li><li><p style=\"min-height:1.5em\">CS or quantitative degree preferred</p></li></ul><p style=\"min-height:1.5em\"><strong>Bonus points:</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Experience with ClickHouse Cloud or other managed analytical databases</p></li><li><p style=\"min-height:1.5em\">Background in operating high-throughput event processing or observability infrastructure</p></li><li><p style=\"min-height:1.5em\">Contributions to open source infrastructure tooling (Helm charts, Terraform modules, etc.)</p></li><li><p style=\"min-height:1.5em\">Former founder</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Process</strong></h1><p style=\"min-height:1.5em\">We can run the full process to your offer letter in <strong>less than 7 days</strong> (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-hire/hiring-process\"><u>hiring process</u></a>).</p><p style=\"min-height:1.5em\"></p><h1><strong>Tech Stack</strong></h1><p style=\"min-height:1.5em\">We run a TypeScript monorepo: Next.js on the frontend, Express workers for background jobs, PostgreSQL for transactional data, ClickHouse for tracing at scale, S3 for file storage, and Redis for queues and caching. You should be familiar with a good chunk of this, but we trust you'll pick up the rest quickly (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/tech-stack\"><u>Stack</u></a>, <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/architecture\"><u>Architecture</u></a>).</p><p style=\"min-height:1.5em\"></p><h1><strong>How we ship</strong></h1><p style=\"min-height:1.5em\"><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/principles\"><u>Link to handbook</u></a></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>We trust you to take ownership (</strong><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/ownership\"><u>ownership overview</u></a><strong>)</strong> for your area. You identify what to build, propose solutions (RFCs), and ship them. Everyone here thinks about the user experience and the technical implementation at the same time. Everyone manages their own Linear.</p></li><li><p style=\"min-height:1.5em\"><strong>You're never alone.</strong> Anyone from the team is happy to go into a whiteboard session with you. 15 minutes of shared discussion can very much improve the overall output.</p></li><li><p style=\"min-height:1.5em\">We implement <strong>maker schedule and communication.</strong> There are two recurring meetings a week: Monday check-in on priorities (15 min) and a demo session on Fridays (60 min).</p></li><li><p style=\"min-height:1.5em\"><strong>Code reviews are mentorship.</strong> New joiners get all PRs reviewed to learn the codebase, patterns, and how the systems work (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/how-we-work/onboarding\"><u>onboarding guide</u></a>).</p></li><li><p style=\"min-height:1.5em\">We <strong>use AI</strong> as much as possible in our workflows to make our users happy. We encourage everyone to experiment with new tooling and AI workflows.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Why Langfuse (now part of ClickHouse)</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">This role puts you at the forefront of the AI revolution, partnering with engineering teams who are building the technology that will define the next decade(s).</p></li><li><p style=\"min-height:1.5em\">This is an open-source devtools company. We ship daily, talk to customers constantly, and fight for great DX. Reliability and performance are central requirements.</p></li><li><p style=\"min-height:1.5em\">Your work ships under your name. You'll appear on <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/changelog\"><u>changelog posts</u></a> for the features you build, and during launch weeks, you'll <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/blog/2025-10-29-launch-week-4\"><u>produce videos</u></a> to announce what you've shipped to the community. You’ll own the full delivery end to end.</p></li><li><p style=\"min-height:1.5em\">We're solving hard engineering problems: figuring out which features actually help users improve AI product performance, building SDKs developers love, visualizing data-rich traces, rendering massive LLM prompts and completions efficiently in the UI, and processing terabytes of data per day through our ingestion pipeline.</p></li><li><p style=\"min-height:1.5em\">You'll work closely with the ClickHouse team and learn how they build a world-class infrastructure company. We're in a period of strong growth: Langfuse is growing organically and accelerating through ClickHouse's GTM. (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/blog/joining-clickhouse\"><u>Why we joined ClickHouse</u></a>)</p></li><li><p style=\"min-height:1.5em\">If you wonder what to build next, our users are a Slack message or a Github discussions post away.</p></li><li><p style=\"min-height:1.5em\">You’re on a continuous learning journey. The AI space develops at breakneck speed and our customers are at the forefront. We need to be ready to meet them where they are and deliver the tools they need just-in-time.</p></li></ul>","directApply":false,"identifier":{"@type":"PropertyValue","name":"Langfuse","value":"1bc2e248-89e7-41d7-b32f-08e9320eb5d0"},"datePosted":"2026-05-27","hiringOrganization":{"@type":"Organization","name":"Langfuse","sameAs":"https://langfuse.com/","logo":"https://app.ashbyhq.com/api/images/org-theme-logo/f6b22e97-ffee-421a-a0e6-c97d85c16c10/bde5e3cf-26f4-47cd-b1de-0897d21e3ce5/ffebe0df-34e9-4507-8588-77c4f7f56f78.png"},"jobLocation":{"@type":"Place","address":{"@type":"PostalAddress","addressCountry":"European Union"}},"employmentType":"FULL_TIME","baseSalary":{"@type":"MonetaryAmount","currency":"EUR","value":{"@type":"QuantitativeValue","minValue":90000,"maxValue":160000,"unitText":"YEAR"}},"jobLocationType":"TELECOMMUTE","applicantLocationRequirements":[{"@type":"Country","name":"Germany"},{"@type":"Country","name":"France"},{"@type":"Country","name":"Switzerland"},{"@type":"Country","name":"European Union"}]}</script>

gStatus","DirectorySyncManager","WorkflowAssessmentIntegrationsSendAutomatically","CandidateLookupByEmailOrPhoneNumberWithoutQueryDSL","WorkflowAssessmentKafkaEvents","AiReportInterpretation","AiReportTitleAndNoteGeneration","NoteReplyPreventEmailLoopDuplicates","UseGlobalQueryScopesOnGlobalApplicationQuestions","EmailChaining","DemoOrgBanners","RecordingStatusPolling","CandidateLookupBySocialProfileURLWithoutQueryDSL","CandidateSocialLinksReadFromTable","SchedulingAvailabilityReminders","ZoomStripHostOptionsInClientServerCommunication","CandidateSocialLinksQueryDSLFieldset","ShowLocationPhysicalAddress","EmployeeTenureQueryFix","AllowCustomReportAlertSchedules","PermissionsAutomationOnJobConfidentialChange","DesignSystemNewIconDesigns","EnableApiAccessToPrivateFields","EnableAnonymizationBackups","ClickhouseSharedStorageSnapshot","AssessmentReporting","CandidateReviewReporting","WorkflowWebhookSteps","WorkflowAssigneeNotificationChannel","UseBillingDbForCredits","UsePdlDatasetForChromeExtension","ClickhouseDataComplianceBackfillCounts","ChromeExtensionIframeLayoutTransform","ChromeExtensionPrefillCandidateImportUrl","MobileCandidatePortal","BulkLinkedInImporter","ShowApplicationEmailTeamMemberSelector","PublishAICriteriaEvents","InterviewPlanOfferStageEditing","WorkflowsRichTextTokenInliningInReplace","CopyCompensationBands","FormulaAndComparisonFields","LiveCalculatedFieldEvaluationInForms","CandidateReviewBulkChangeStage","EducationHistoryFormField","MultipleDataRetentionRules","MobileEmployeeSurveys","OfferAcceptanceDryRunSkipAutomaticActivities","AshbyFormSetValueMutex","FrontendAshbyFormUseLocalValueRerenderLogic","FrontendSerializeFormSetValue","FrontendUserDebounceSetFormField","AmplitudeAIAssistant","SchedulingAutoReplaceCustomCutoff","CoreMultipleBrandsFeedFiltering","EagerLoadInterviewEventsApplicationChain","ApprovalNotesPerApprover","ResumableDailyDemoDataGeneration","AmplitudeSDK","FormEngineResolveValueSelectLabels","ApprovalNotesFromEmail","CreditManagementV2","ReadCreditUsageFromBillingDb","BlockedApplicationSubmissionObjectType","ADPRegionSettings","ClickhouseArchivedCandidatesGlobal","UseAggregatedApplicationCountSubquery","DefaultCurrencyForCurrencyCustomFields","AiReportAssistantNonTemplateFallback","WorkflowDependencyFixPointLoop","WorkflowEnrollPerformance","AiCustomAgents","OfferPacketDeprecateSingleDocumentView","InAtsSourcing","InAtsSourcingUserAccess","SlackAssistant","DsInfoRedesign","CanonicalizeSchools","WorkflowConditionCache","FunnelReportParallelShowActiveQueries","EsignatureDocumentSignerDateReportingFields","AiEnhancedResumeParsing","WorkflowSerializeSideEffects","WorkflowMergeConditionValidation","DecoupleFilterDecodeFromFieldset","AutoSchedulePastTimeWarning","ClickhouseHiredCandidatesGlobal","AiCreditsDashboard","CandidateOptOutReporting","OfferPacketUnifiedUx","CandidateSearchPagePreloads","OpenAIResponsesCompactionOrdering","SyncGoogleAliasesForSCIMWrite","PublicApiApplicationListBatchArchivedAt","OptionPreviewOverlayElevatedZIndex","CalendarSyncSegmentation","SchedulingRelyOnUniqueIndexForLiveBackingDraft","ChromeExtensionBulkActions","OfferPacketContextAwarePrimaryAction","EmailSyncExplanation","EducationHistoryRelatedFieldsets","AiJobCriteriaEvaluationGPT54Nano","SyncGoogleAliasesForSCIM","DetectDuplicatesByLinkedEmployeeEmail","CacheReportsAsExportableForm","PipelineJobScopedAutomaticActivityTitles","ChromeExtensionAutoResolveLinkedInRecruiterProfile","SavedReportBrowserV2","DocusignMapAccountCustomFields","QueryDSLLightweightScorecardFormConfiguration","SchedulingGCalSendUpdatesForCancelEvents","SchedulingDraftSchedulePermissionsRollout","CampaignScheduledEmailManualRetryError","SchedulingAutoSchedulePermissionChecks","AshbyAssistantProductHelp","ConditionalExecutionWrapCommonPrefixFiltersIntoSubQuery","OfferFieldsOnEmployeeReports","EmployeeCustomFieldTokens"],"allowJobPostIndexing":true,"isDemoOrg":false,"theme":{"colors":{"version":"1","colorPrimary600":"#515151","colorPrimary900":"#515151"},"showJobFilters":true,"showLocationAddress":false,"showTeams":false,"showAutofillApplicationsBox":false,"logoWordmarkImageUrl":"https://app.ashbyhq.com/api/images/org-theme-wordmark/f6b22e97-ffee-421a-a0e6-c97d85c16c10/bde5e3cf-26f4-47cd-b1de-0897d21e3ce5/aa3c5ae4-3d4e-4fe6-af92-fe4a3645434e.png","logoSquareImageUrl":"https://app.ashbyhq.com/api/images/org-theme-logo/f6b22e97-ffee-421a-a0e6-c97d85c16c10/bde5e3cf-26f4-47cd-b1de-0897d21e3ce5/ffebe0df-34e9-4507-8588-77c4f7f56f78.png","applicationSubmittedSuccessMessage":null,"jobBoardTopDescriptionHtml":"<p style=\"min-height:1.5em\">Our<strong> Core Product Engineering Team </strong>is currently in Berlin, Germany. </p><p style=\"min-height:1.5em\">We are hiring <strong>across Europe</strong> now, with one mandatory week in Berlin per month. </p><p style=\"min-height:1.5em\">For <strong>Go-To-Market Roles we offer flexibility to join in San Francisco or in Berlin.</strong></p>","jobBoardBottomDescriptionHtml":"<p style=\"min-height:1.5em\"></p>","jobPostingBackUrl":null},"appConfirmationTrackingPixelHtml":null,"recruitingPrivacyPolicyUrl":null,"timezone":"Europe/Berlin","candidateScheduleCancellationReasonRequirementStatus":"Off","showCookieBanner":false},"posting":{"id":"1bc2e248-89e7-41d7-b32f-08e9320eb5d0","title":"Senior Cloud Infrastructure Engineer","updatedAt":"2026-05-27T18:55:31.238Z","departmentName":"Engineering","departmentExternalName":"Engineering","teamName":"Engineering","teamExternalName":"Engineering","teamNames":["Engineering"],"locationName":"Europe","locationExternalName":"Europe","isListed":true,"suppressDescriptionOpening":false,"suppressDescriptionClosing":false,"descriptionHtml":"<h1><strong>About Langfuse</strong></h1><p style=\"min-height:1.5em\">Open Source LLM Engineering Platform that helps teams build useful AI applications via tracing, evaluation, and prompt management (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/0/82383757e54352130f65066e1b2fc4708aacab7897561bcb8000fe4c8a9c6a21?cache_buster=1761124921\"><u>mission</u></a>, <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/1/b9fba3a93b6ffcc0f99ecda62767a17cc437fe8fe0b16181d1c43c1391212e3d?cache_buster=1761124921\"><u>product</u></a>). We are now part of ClickHouse.</p><p style=\"min-height:1.5em\">We're building the \"Datadog\" of this category; model capabilities continue to improve, but building useful applications is really hard, both in startups and enterprises.</p><p style=\"min-height:1.5em\">Largest open source solution in this category: trusted by 19 of the Fortune 50, &gt;2k customers, &gt;26M monthly SDK downloads, &gt;6M Docker pulls.</p><p style=\"min-height:1.5em\">We joined ClickHouse in January 2026 because LLM observability is fundamentally a data problem and Langfuse already ran on ClickHouse. Together we can move faster on product while staying true to open source and self-hosting, and join forces on GTM and sales to accelerate revenue.</p><p style=\"min-height:1.5em\">Previously backed by Y Combinator, Lightspeed, and General Catalyst.</p><p style=\"min-height:1.5em\">We're a small, engineering-heavy, and experienced team in Berlin and San Francisco. We are also hiring for engineering in EU timezones and expect one week per month in our Berlin office (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/principles\"><u>how we work</u></a>).</p><p style=\"min-height:1.5em\"></p><h2><strong>Why Cloud Infrastructure at Langfuse</strong></h2><p style=\"min-height:1.5em\"><strong>Your work will keep Langfuse running — everywhere.</strong></p><p style=\"min-height:1.5em\">Langfuse processes over a billion trace events per month. When a Fortune 50 company relies on Langfuse in production, they're relying on the infrastructure you operate. You'll own uptime, performance, and cost efficiency across our entire cloud footprint — and you'll make sure every self-hosted deployment runs just as smoothly.</p><p style=\"min-height:1.5em\">You'll operate Langfuse Cloud on AWS ECS Fargate and ClickHouse Cloud, with Datadog as the observability backbone. You'll also own our public self-hosted infrastructure — including our Helm chart, Docker Compose setup, and everything in between — so that teams from startups to enterprises can run Langfuse on their own terms.</p><p style=\"min-height:1.5em\">This isn't a \"maintain what exists\" role. We're scaling fast, and you'll be the person who makes sure the infrastructure grows ahead of demand — not behind it.</p><p style=\"min-height:1.5em\">Langfuse is now part of ClickHouse, which means the team behind the database at the core of our stack is one channel away. Few infrastructure roles give you that kind of direct access to the people who build your most critical dependency.</p><p style=\"min-height:1.5em\"></p><h2><strong>You will grow at Langfuse by</strong></h2><p style=\"min-height:1.5em\"><strong>Own Langfuse Cloud operations:</strong> You'll run our production environments on AWS ECS Fargate and ClickHouse Cloud. You'll manage deployments, autoscaling, capacity planning, and cost optimization — making sure we stay fast and affordable as traffic scales.</p><p style=\"min-height:1.5em\"><strong>Build world-class observability:</strong> You'll own our Datadog setup end to end — dashboards, alerts, and SLOs. When something degrades, you'll ensure we know before our customers do. You'll build the monitoring culture that lets the whole team ship with confidence.</p><p style=\"min-height:1.5em\"><strong>Make self-hosting effortless:</strong> Thousands of teams run Langfuse on their own infrastructure. You'll own and evolve our Helm chart, Docker Compose configuration, and deployment documentation. You'll turn \"works on my machine\" into \"works on every machine\" — from a single-node setup to a multi-region enterprise deployment.</p><p style=\"min-height:1.5em\"><strong>Automate everything:</strong> CI/CD pipelines, infrastructure-as-code, automated scaling, zero-downtime deployments. You'll replace manual processes with automation that makes the team faster and the platform more reliable.</p><p style=\"min-height:1.5em\"><strong>Scale for what's next:</strong> We're growing fast and new product directions — like complex long-running agent observability and real-time evaluation — push the infrastructure in new ways. You'll be thinking ahead about what breaks at 10x scale and building the foundation before we get there. 10x is always just one quarter away here at Langfuse.</p><p style=\"min-height:1.5em\"><strong>Harden security and compliance:</strong> As more enterprises adopt Langfuse, you'll help ensure our cloud and self-hosted deployments meet the security and compliance bar that large organizations require.</p><p style=\"min-height:1.5em\"></p><h2><strong>What we're looking for</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Strong infrastructure or SRE engineer who gets excited about running systems at scale and making them better every day</p></li><li><p style=\"min-height:1.5em\">Experience operating production workloads on AWS (ECS/Fargate, networking, IAM, S3, etc.) or on comparable hyperscale vendors.</p></li><li><p style=\"min-height:1.5em\">Comfortable with container orchestration — Kubernetes and/or ECS, Helm charts, Docker</p></li><li><p style=\"min-height:1.5em\">Experience with infrastructure-as-code (Terraform, Pulumi, CloudFormation, or similar)</p></li><li><p style=\"min-height:1.5em\">Strong monitoring and observability instincts — you've built dashboards and alerts that actually caught problems (Datadog experience is a plus)</p></li><li><p style=\"min-height:1.5em\">You organize yourself. You have strong opinions about reliability, automation, and how to ship infrastructure changes safely</p></li><li><p style=\"min-height:1.5em\">Interest in open source software and genuine enjoyment helping users debug their self-hosted deployments</p></li><li><p style=\"min-height:1.5em\">Thrives in a small, accountable team where your output is visible and matters</p></li><li><p style=\"min-height:1.5em\">CS or quantitative degree preferred</p></li></ul><p style=\"min-height:1.5em\"><strong>Bonus points:</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Experience with ClickHouse Cloud or other managed analytical databases</p></li><li><p style=\"min-height:1.5em\">Background in operating high-throughput event processing or observability infrastructure</p></li><li><p style=\"min-height:1.5em\">Contributions to open source infrastructure tooling (Helm charts, Terraform modules, etc.)</p></li><li><p style=\"min-height:1.5em\">Former founder</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Process</strong></h1><p style=\"min-height:1.5em\">We can run the full process to your offer letter in <strong>less than 7 days</strong> (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-hire/hiring-process\"><u>hiring process</u></a>).</p><p style=\"min-height:1.5em\"></p><h1><strong>Tech Stack</strong></h1><p style=\"min-height:1.5em\">We run a TypeScript monorepo: Next.js on the frontend, Express workers for background jobs, PostgreSQL for transactional data, ClickHouse for tracing at scale, S3 for file storage, and Redis for queues and caching. You should be familiar with a good chunk of this, but we trust you'll pick up the rest quickly (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/tech-stack\"><u>Stack</u></a>, <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/architecture\"><u>Architecture</u></a>).</p><p style=\"min-height:1.5em\"></p><h1><strong>How we ship</strong></h1><p style=\"min-height:1.5em\"><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/principles\"><u>Link to handbook</u></a></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>We trust you to take ownership (</strong><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/ownership\"><u>ownership overview</u></a><strong>)</strong> for your area. You identify what to build, propose solutions (RFCs), and ship them. Everyone here thinks about the user experience and the technical implementation at the same time. Everyone manages their own Linear.</p></li><li><p style=\"min-height:1.5em\"><strong>You're never alone.</strong> Anyone from the team is happy to go into a whiteboard session with you. 15 minutes of shared discussion can very much improve the overall output.</p></li><li><p style=\"min-height:1.5em\">We implement <strong>maker schedule and communication.</strong> There are two recurring meetings a week: Monday check-in on priorities (15 min) and a demo session on Fridays (60 min).</p></li><li><p style=\"min-height:1.5em\"><strong>Code reviews are mentorship.</strong> New joiners get all PRs reviewed to learn the codebase, patterns, and how the systems work (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/how-we-work/onboarding\"><u>onboarding guide</u></a>).</p></li><li><p style=\"min-height:1.5em\">We <strong>use AI</strong> as much as possible in our workflows to make our users happy. We encourage everyone to experiment with new tooling and AI workflows.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Why Langfuse (now part of ClickHouse)</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">This role puts you at the forefront of the AI revolution, partnering with engineering teams who are building the technology that will define the next decade(s).</p></li><li><p style=\"min-height:1.5em\">This is an open-source devtools company. We ship daily, talk to customers constantly, and fight for great DX. Reliability and performance are central requirements.</p></li><li><p style=\"min-height:1.5em\">Your work ships under your name. You'll appear on <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/changelog\"><u>changelog posts</u></a> for the features you build, and during launch weeks, you'll <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/blog/2025-10-29-launch-week-4\"><u>produce videos</u></a> to announce what you've shipped to the community. You’ll own the full delivery end to end.</p></li><li><p style=\"min-height:1.5em\">We're solving hard engineering problems: figuring out which features actually help users improve AI product performance, building SDKs developers love, visualizing data-rich traces, rendering massive LLM prompts and completions efficiently in the UI, and processing terabytes of data per day through our ingestion pipeline.</p></li><li><p style=\"min-height:1.5em\">You'll work closely with the ClickHouse team and learn how they build a world-class infrastructure company. We're in a period of strong growth: Langfuse is growing organically and accelerating through ClickHouse's GTM. (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/blog/joining-clickhouse\"><u>Why we joined ClickHouse</u></a>)</p></li><li><p style=\"min-height:1.5em\">If you wonder what to build next, our users are a Slack message or a Github discussions post away.</p></li><li><p style=\"min-height:1.5em\">You’re on a continuous learning journey. The AI space develops at breakneck speed and our customers are at the forefront. We need to be ready to meet them where they are and deliver the tools they need just-in-time.</p></li></ul>","descriptionPlainText":"ABOUT LANGFUSE\n\nOpen Source LLM Engineering Platform that helps teams build useful AI applications via tracing, evaluation, and prompt management (mission https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/0/82383757e54352130f65066e1b2fc4708aacab7897561bcb8000fe4c8a9c6a21?cache_buster=1761124921, product https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/1/b9fba3a93b6ffcc0f99ecda62767a17cc437fe8fe0b16181d1c43c1391212e3d?cache_buster=1761124921). We are now part of ClickHouse.\n\nWe're building the \"Datadog\" of this category; model capabilities continue to improve, but building useful applications is really hard, both in startups and enterprises.\n\nLargest open source solution in this category: trusted by 19 of the Fortune 50, >2k customers, >26M monthly SDK downloads, >6M Docker pulls.\n\nWe joined ClickHouse in January 2026 because LLM observability is fundamentally a data problem and Langfuse already ran on ClickHouse. Together we can move faster on product while staying true to open source and self-hosting, and join forces on GTM and sales to accelerate revenue.\n\nPreviously backed by Y Combinator, Lightspeed, and General Catalyst.\n\nWe're a small, engineering-heavy, and experienced team in Berlin and San Francisco. We are also hiring for engineering in EU timezones and expect one week per month in our Berlin office (how we work https://langfuse.com/handbook/how-we-work/principles).\n\n\nWHY CLOUD INFRASTRUCTURE AT LANGFUSE\n\nYour work will keep Langfuse running — everywhere.\n\nLangfuse processes over a billion trace events per month. When a Fortune 50 company relies on Langfuse in production, they're relying on the infrastructure you operate. You'll own uptime, performance, and cost efficiency across our entire cloud footprint — and you'll make sure every self-hosted deployment runs just as smoothly.\n\nYou'll operate Langfuse Cloud on AWS ECS Fargate and ClickHouse Cloud, with Datadog as the observability backbone. You'll also own our public self-hosted infrastructure — including our Helm chart, Docker Compose setup, and everything in between — so that teams from startups to enterprises can run Langfuse on their own terms.\n\nThis isn't a \"maintain what exists\" role. We're scaling fast, and you'll be the person who makes sure the infrastructure grows ahead of demand — not behind it.\n\nLangfuse is now part of ClickHouse, which means the team behind the database at the core of our stack is one channel away. Few infrastructure roles give you that kind of direct access to the people who build your most critical dependency.\n\n\nYOU WILL GROW AT LANGFUSE BY\n\nOwn Langfuse Cloud operations: You'll run our production environments on AWS ECS Fargate and ClickHouse Cloud. You'll manage deployments, autoscaling, capacity planning, and cost optimization — making sure we stay fast and affordable as traffic scales.\n\nBuild world-class observability: You'll own our Datadog setup end to end — dashboards, alerts, and SLOs. When something degrades, you'll ensure we know before our customers do. You'll build the monitoring culture that lets the whole team ship with confidence.\n\nMake self-hosting effortless: Thousands of teams run Langfuse on their own infrastructure. You'll own and evolve our Helm chart, Docker Compose configuration, and deployment documentation. You'll turn \"works on my machine\" into \"works on every machine\" — from a single-node setup to a multi-region enterprise deployment.\n\nAutomate everything: CI/CD pipelines, infrastructure-as-code, automated scaling, zero-downtime deployments. You'll replace manual processes with automation that makes the team faster and the platform more reliable.\n\nScale for what's next: We're growing fast and new product directions — like complex long-running agent observability and real-time evaluation — push the infrastructure in new ways. You'll be thinking ahead about what breaks at 10x scale and building the foundation before we get there. 10x is always just one quarter away here at Langfuse.\n\nHarden security and compliance: As more enterprises adopt Langfuse, you'll help ensure our cloud and self-hosted deployments meet the security and compliance bar that large organizations require.\n\n\nWHAT WE'RE LOOKING FOR\n\n - Strong infrastructure or SRE engineer who gets excited about running systems at scale and making them better every day\n\n - Experience operating production workloads on AWS (ECS/Fargate, networking, IAM, S3, etc.) or on comparable hyperscale vendors.\n\n - Comfortable with container orchestration — Kubernetes and/or ECS, Helm charts, Docker\n\n - Experience with infrastructure-as-code (Terraform, Pulumi, CloudFormation, or similar)\n\n - Strong monitoring and observability instincts — you've built dashboards and alerts that actually caught problems (Datadog experience is a plus)\n\n - You organize yourself. You have strong opinions about reliability, automation, and how to ship infrastructure changes safely\n\n - Interest in open source software and genuine enjoyment helping users debug their self-hosted deployments\n\n - Thrives in a small, accountable team where your output is visible and matters\n\n - CS or quantitative degree preferred\n\nBonus points:\n\n - Experience with ClickHouse Cloud or other managed analytical databases\n\n - Background in operating high-throughput event processing or observability infrastructure\n\n - Contributions to open source infrastructure tooling (Helm charts, Terraform modules, etc.)\n\n - Former founder\n\n\nPROCESS\n\nWe can run the full process to your offer letter in less than 7 days (hiring process https://langfuse.com/handbook/how-we-hire/hiring-process).\n\n\nTECH STACK\n\nWe run a TypeScript monorepo: Next.js on the frontend, Express workers for background jobs, PostgreSQL for transactional data, ClickHouse for tracing at scale, S3 for file storage, and Redis for queues and caching. You should be familiar with a good chunk of this, but we trust you'll pick up the rest quickly (Stack https://langfuse.com/handbook/product-engineering/tech-stack, Architecture https://langfuse.com/handbook/product-engineering/architecture).\n\n\nHOW WE SHIP\n\nLink to handbook https://langfuse.com/handbook/how-we-work/principles\n\n - We trust you to take ownership (ownership overview https://langfuse.com/handbook/how-we-work/ownership) for your area. You identify what to build, propose solutions (RFCs), and ship them. Everyone here thinks about the user experience and the technical implementation at the same time. Everyone manages their own Linear.\n\n - You're never alone. Anyone from the team is happy to go into a whiteboard session with you. 15 minutes of shared discussion can very much improve the overall output.\n\n - We implement maker schedule and communication. There are two recurring meetings a week: Monday check-in on priorities (15 min) and a demo session on Fridays (60 min).\n\n - Code reviews are mentorship. New joiners get all PRs reviewed to learn the codebase, patterns, and how the systems work (onboarding guide https://langfuse.com/handbook/product-engineering/how-we-work/onboarding).\n\n - We use AI as much as possible in our workflows to make our users happy. We encourage everyone to experiment with new tooling and AI workflows.\n\n\nWHY LANGFUSE (NOW PART OF CLICKHOUSE)\n\n - This role puts you at the forefront of the AI revolution, partnering with engineering teams who are building the technology that will define the next decade(s).\n\n - This is an open-source devtools company. We ship daily, talk to customers constantly, and fight for great DX. Reliability and performance are central requirements.\n\n - Your work ships under your name. You'll appear on changelog posts https://langfuse.com/changelog for the features you build, and during launch weeks, you'll produce videos https://langfuse.com/blog/2025-10-29-launch-week-4 to announce what you've shipped to the community. You’ll own the full delivery end to end.\n\n - We're solving hard engineering problems: figuring out which features actually help users improve AI product performance, building SDKs developers love, visualizing data-rich traces, rendering massive LLM prompts and completions efficiently in the UI, and processing terabytes of data per day through our ingestion pipeline.\n\n - You'll work closely with the ClickHouse team and learn how they build a world-class infrastructure company. We're in a period of strong growth: Langfuse is growing organically and accelerating through ClickHouse's GTM. (Why we joined ClickHouse https://langfuse.com/blog/joining-clickhouse)\n\n - If you wonder what to build next, our users are a Slack message or a Github discussions post away.\n\n - You’re on a continuous learning journey. The AI space develops at breakneck speed and our customers are at the forefront. We need to be ready to meet them where they are and deliver the tools they need just-in-time.","descriptionParts":{"descriptionOpening":{"html":"<h1><strong>About Langfuse</strong></h1><p style=\"min-height:1.5em\">Open Source LLM Engineering Platform that helps teams build useful AI applications via tracing, evaluation, and prompt management (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/0/82383757e54352130f65066e1b2fc4708aacab7897561bcb8000fe4c8a9c6a21?cache_buster=1761124921\"><u>mission</u></a>, <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/1/b9fba3a93b6ffcc0f99ecda62767a17cc437fe8fe0b16181d1c43c1391212e3d?cache_buster=1761124921\"><u>product</u></a>). We are now part of ClickHouse.</p><p style=\"min-height:1.5em\">We're building the \"Datadog\" of this category; model capabilities continue to improve, but building useful applications is really hard, both in startups and enterprises.</p><p style=\"min-height:1.5em\">Largest open source solution in this category: trusted by 19 of the Fortune 50, &gt;2k customers, &gt;26M monthly SDK downloads, &gt;6M Docker pulls.</p><p style=\"min-height:1.5em\">We joined ClickHouse in January 2026 because LLM observability is fundamentally a data problem and Langfuse already ran on ClickHouse. Together we can move faster on product while staying true to open source and self-hosting, and join forces on GTM and sales to accelerate revenue.</p><p style=\"min-height:1.5em\">Previously backed by Y Combinator, Lightspeed, and General Catalyst.</p><p style=\"min-height:1.5em\">We're a small, engineering-heavy, and experienced team in Berlin and San Francisco. We are also hiring for engineering in EU timezones and expect one week per month in our Berlin office (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/principles\"><u>how we work</u></a>).</p><p style=\"min-height:1.5em\"></p>","plain":"ABOUT LANGFUSE\n\nOpen Source LLM Engineering Platform that helps teams build useful AI applications via tracing, evaluation, and prompt management (mission https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/0/82383757e54352130f65066e1b2fc4708aacab7897561bcb8000fe4c8a9c6a21?cache_buster=1761124921, product https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/1/b9fba3a93b6ffcc0f99ecda62767a17cc437fe8fe0b16181d1c43c1391212e3d?cache_buster=1761124921). We are now part of ClickHouse.\n\nWe're building the \"Datadog\" of this category; model capabilities continue to improve, but building useful applications is really hard, both in startups and enterprises.\n\nLargest open source solution in this category: trusted by 19 of the Fortune 50, >2k customers, >26M monthly SDK downloads, >6M Docker pulls.\n\nWe joined ClickHouse in January 2026 because LLM observability is fundamentally a data problem and Langfuse already ran on ClickHouse. Together we can move faster on product while staying true to open source and self-hosting, and join forces on GTM and sales to accelerate revenue.\n\nPreviously backed by Y Combinator, Lightspeed, and General Catalyst.\n\nWe're a small, engineering-heavy, and experienced team in Berlin and San Francisco. We are also hiring for engineering in EU timezones and expect one week per month in our Berlin office (how we work https://langfuse.com/handbook/how-we-work/principles)."},"descriptionBody":{"html":"<h2><strong>Why Cloud Infrastructure at Langfuse</strong></h2><p style=\"min-height:1.5em\"><strong>Your work will keep Langfuse running — everywhere.</strong></p><p style=\"min-height:1.5em\">Langfuse processes over a billion trace events per month. When a Fortune 50 company relies on Langfuse in production, they're relying on the infrastructure you operate. You'll own uptime, performance, and cost efficiency across our entire cloud footprint — and you'll make sure every self-hosted deployment runs just as smoothly.</p><p style=\"min-height:1.5em\">You'll operate Langfuse Cloud on AWS ECS Fargate and ClickHouse Cloud, with Datadog as the observability backbone. You'll also own our public self-hosted infrastructure — including our Helm chart, Docker Compose setup, and everything in between — so that teams from startups to enterprises can run Langfuse on their own terms.</p><p style=\"min-height:1.5em\">This isn't a \"maintain what exists\" role. We're scaling fast, and you'll be the person who makes sure the infrastructure grows ahead of demand — not behind it.</p><p style=\"min-height:1.5em\">Langfuse is now part of ClickHouse, which means the team behind the database at the core of our stack is one channel away. Few infrastructure roles give you that kind of direct access to the people who build your most critical dependency.</p><p style=\"min-height:1.5em\"></p><h2><strong>You will grow at Langfuse by</strong></h2><p style=\"min-height:1.5em\"><strong>Own Langfuse Cloud operations:</strong> You'll run our production environments on AWS ECS Fargate and ClickHouse Cloud. You'll manage deployments, autoscaling, capacity planning, and cost optimization — making sure we stay fast and affordable as traffic scales.</p><p style=\"min-height:1.5em\"><strong>Build world-class observability:</strong> You'll own our Datadog setup end to end — dashboards, alerts, and SLOs. When something degrades, you'll ensure we know before our customers do. You'll build the monitoring culture that lets the whole team ship with confidence.</p><p style=\"min-height:1.5em\"><strong>Make self-hosting effortless:</strong> Thousands of teams run Langfuse on their own infrastructure. You'll own and evolve our Helm chart, Docker Compose configuration, and deployment documentation. You'll turn \"works on my machine\" into \"works on every machine\" — from a single-node setup to a multi-region enterprise deployment.</p><p style=\"min-height:1.5em\"><strong>Automate everything:</strong> CI/CD pipelines, infrastructure-as-code, automated scaling, zero-downtime deployments. You'll replace manual processes with automation that makes the team faster and the platform more reliable.</p><p style=\"min-height:1.5em\"><strong>Scale for what's next:</strong> We're growing fast and new product directions — like complex long-running agent observability and real-time evaluation — push the infrastructure in new ways. You'll be thinking ahead about what breaks at 10x scale and building the foundation before we get there. 10x is always just one quarter away here at Langfuse.</p><p style=\"min-height:1.5em\"><strong>Harden security and compliance:</strong> As more enterprises adopt Langfuse, you'll help ensure our cloud and self-hosted deployments meet the security and compliance bar that large organizations require.</p><p style=\"min-height:1.5em\"></p><h2><strong>What we're looking for</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Strong infrastructure or SRE engineer who gets excited about running systems at scale and making them better every day</p></li><li><p style=\"min-height:1.5em\">Experience operating production workloads on AWS (ECS/Fargate, networking, IAM, S3, etc.) or on comparable hyperscale vendors.</p></li><li><p style=\"min-height:1.5em\">Comfortable with container orchestration — Kubernetes and/or ECS, Helm charts, Docker</p></li><li><p style=\"min-height:1.5em\">Experience with infrastructure-as-code (Terraform, Pulumi, CloudFormation, or similar)</p></li><li><p style=\"min-height:1.5em\">Strong monitoring and observability instincts — you've built dashboards and alerts that actually caught problems (Datadog experience is a plus)</p></li><li><p style=\"min-height:1.5em\">You organize yourself. You have strong opinions about reliability, automation, and how to ship infrastructure changes safely</p></li><li><p style=\"min-height:1.5em\">Interest in open source software and genuine enjoyment helping users debug their self-hosted deployments</p></li><li><p style=\"min-height:1.5em\">Thrives in a small, accountable team where your output is visible and matters</p></li><li><p style=\"min-height:1.5em\">CS or quantitative degree preferred</p></li></ul><p style=\"min-height:1.5em\"><strong>Bonus points:</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Experience with ClickHouse Cloud or other managed analytical databases</p></li><li><p style=\"min-height:1.5em\">Background in operating high-throughput event processing or observability infrastructure</p></li><li><p style=\"min-height:1.5em\">Contributions to open source infrastructure tooling (Helm charts, Terraform modules, etc.)</p></li><li><p style=\"min-height:1.5em\">Former founder</p></li></ul>","plain":"WHY CLOUD INFRASTRUCTURE AT LANGFUSE\n\nYour work will keep Langfuse running — everywhere.\n\nLangfuse processes over a billion trace events per month. When a Fortune 50 company relies on Langfuse in production, they're relying on the infrastructure you operate. You'll own uptime, performance, and cost efficiency across our entire cloud footprint — and you'll make sure every self-hosted deployment runs just as smoothly.\n\nYou'll operate Langfuse Cloud on AWS ECS Fargate and ClickHouse Cloud, with Datadog as the observability backbone. You'll also own our public self-hosted infrastructure — including our Helm chart, Docker Compose setup, and everything in between — so that teams from startups to enterprises can run Langfuse on their own terms.\n\nThis isn't a \"maintain what exists\" role. We're scaling fast, and you'll be the person who makes sure the infrastructure grows ahead of demand — not behind it.\n\nLangfuse is now part of ClickHouse, which means the team behind the database at the core of our stack is one channel away. Few infrastructure roles give you that kind of direct access to the people who build your most critical dependency.\n\n\nYOU WILL GROW AT LANGFUSE BY\n\nOwn Langfuse Cloud operations: You'll run our production environments on AWS ECS Fargate and ClickHouse Cloud. You'll manage deployments, autoscaling, capacity planning, and cost optimization — making sure we stay fast and affordable as traffic scales.\n\nBuild world-class observability: You'll own our Datadog setup end to end — dashboards, alerts, and SLOs. When something degrades, you'll ensure we know before our customers do. You'll build the monitoring culture that lets the whole team ship with confidence.\n\nMake self-hosting effortless: Thousands of teams run Langfuse on their own infrastructure. You'll own and evolve our Helm chart, Docker Compose configuration, and deployment documentation. You'll turn \"works on my machine\" into \"works on every machine\" — from a single-node setup to a multi-region enterprise deployment.\n\nAutomate everything: CI/CD pipelines, infrastructure-as-code, automated scaling, zero-downtime deployments. You'll replace manual processes with automation that makes the team faster and the platform more reliable.\n\nScale for what's next: We're growing fast and new product directions — like complex long-running agent observability and real-time evaluation — push the infrastructure in new ways. You'll be thinking ahead about what breaks at 10x scale and building the foundation before we get there. 10x is always just one quarter away here at Langfuse.\n\nHarden security and compliance: As more enterprises adopt Langfuse, you'll help ensure our cloud and self-hosted deployments meet the security and compliance bar that large organizations require.\n\n\nWHAT WE'RE LOOKING FOR\n\n - Strong infrastructure or SRE engineer who gets excited about running systems at scale and making them better every day\n\n - Experience operating production workloads on AWS (ECS/Fargate, networking, IAM, S3, etc.) or on comparable hyperscale vendors.\n\n - Comfortable with container orchestration — Kubernetes and/or ECS, Helm charts, Docker\n\n - Experience with infrastructure-as-code (Terraform, Pulumi, CloudFormation, or similar)\n\n - Strong monitoring and observability instincts — you've built dashboards and alerts that actually caught problems (Datadog experience is a plus)\n\n - You organize yourself. You have strong opinions about reliability, automation, and how to ship infrastructure changes safely\n\n - Interest in open source software and genuine enjoyment helping users debug their self-hosted deployments\n\n - Thrives in a small, accountable team where your output is visible and matters\n\n - CS or quantitative degree preferred\n\nBonus points:\n\n - Experience with ClickHouse Cloud or other managed analytical databases\n\n - Background in operating high-throughput event processing or observability infrastructure\n\n - Contributions to open source infrastructure tooling (Helm charts, Terraform modules, etc.)\n\n - Former founder"},"descriptionClosing":{"html":"<p style=\"min-height:1.5em\"></p><h1><strong>Process</strong></h1><p style=\"min-height:1.5em\">We can run the full process to your offer letter in <strong>less than 7 days</strong> (<a target=\"_bla rities (15 min) and a demo session on Fridays (60 min).</p></li><li><p style=\"min-height:1.5em\"><strong>Code reviews are mentorship.</strong> New joiners get all PRs reviewed to learn the codebase, patterns, and how the systems work (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/how-we-work/onboarding\"><u>onboarding guide</u></a>).</p></li><li><p style=\"min-height:1.5em\">We <strong>use AI</strong> as much as possible in our workflows to make our users happy. We encourage everyone to experiment with new tooling and AI workflows.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Why Langfuse (now part of ClickHouse)</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">This role puts you at the forefront of the AI revolution, partnering with engineering teams who are building the technology that will define the next decade(s).</p></li><li><p style=\"min-height:1.5em\">This is an open-source devtools company. We ship daily, talk to customers constantly, and fight for great DX. Reliability and performance are central requirements.</p></li><li><p style=\"min-height:1.5em\">Your work ships under your name. You'll appear on <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/changelog\"><u>changelog posts</u></a> for the features you build, and during launch weeks, you'll <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/blog/2025-10-29-launch-week-4\"><u>produce videos</u></a> to announce what you've shipped to the community. You’ll own the full delivery end to end.</p></li><li><p style=\"min-height:1.5em\">We're solving hard engineering problems: figuring out which features actually help users improve AI product performance, building SDKs developers love, visualizing data-rich traces, rendering massive LLM prompts and completions efficiently in the UI, and processing terabytes of data per day through our ingestion pipeline.</p></li><li><p style=\"min-height:1.5em\">You'll work closely with the ClickHouse team and learn how they build a world-class infrastructure company. We're in a period of strong growth: Langfuse is growing organically and accelerating through ClickHouse's GTM. (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/blog/joining-clickhouse\"><u>Why we joined ClickHouse</u></a>)</p></li><li><p style=\"min-height:1.5em\">If you wonder what to build next, our users are a Slack message or a Github discussions post away.</p></li><li><p style=\"min-height:1.5em\">You’re on a continuous learning journey. The AI space develops at breakneck speed and our customers are at the forefront. We need to be ready to meet them where they are and deliver the tools they need just-in-time.</p></li></ul>","plain":"PROCESS\n\nWe can run the full process to your offer letter in less than 7 days (hiring process https://langfuse.com/handbook/how-we-hire/hiring-process).\n\n\nTECH STACK\n\nWe run a TypeScript monorepo: Next.js on the frontend, Express workers for background jobs, PostgreSQL for transactional data, ClickHouse for tracing at scale, S3 for file storage, and Redis for queues and caching. You should be familiar with a good chunk of this, but we trust you'll pick up the rest quickly (Stack https://langfuse.com/handbook/product-engineering/tech-stack, Architecture https://langfuse.com/handbook/product-engineering/architecture).\n\n\nHOW WE SHIP\n\nLink to handbook https://langfuse.com/handbook/how-we-work/principles\n\n - We trust you to take ownership (ownership overview https://langfuse.com/handbook/how-we-work/ownership) for your area. You identify what to build, propose solutions (RFCs), and ship them. Everyone here thinks about the user experience and the technical implementation at the same time. Everyone manages their own Linear.\n\n - You're never alone. Anyone from the team is happy to go into a whiteboard session with you. 15 minutes of shared discussion can very much improve the overall output.\n\n - We implement maker schedule and communication. There are two recurring meetings a week: Monday check-in on priorities (15 min) and a demo session on Fridays (60 min).\n\n - Code reviews are mentorship. New joiners get all PRs reviewed to learn the codebase, patterns, and how the systems work (onboarding guide https://langfuse.com/handbook/product-engineering/how-we-work/onboarding).\n\n - We use AI as much as possible in our workflows to make our users happy. We encourage everyone to experiment with new tooling and AI workflows.\n\n\nWHY LANGFUSE (NOW PART OF CLICKHOUSE)\n\n - This role puts you at the forefront of the AI revolution, partnering with engineering teams who are building the technology that will define the next decade(s).\n\n - This is an open-source devtools company. We ship daily, talk to customers constantly, and fight for great DX. Reliability and performance are central requirements.\n\n - Your work ships under your name. You'll appear on changelog posts https://langfuse.com/changelog for the features you build, and during launch weeks, you'll produce videos https://langfuse.com/blog/2025-10-29-launch-week-4 to announce what you've shipped to the community. You’ll own the full delivery end to end.\n\n - We're solving hard engineering problems: figuring out which features actually help users improve AI product performance, building SDKs developers love, visualizing data-rich traces, rendering massive LLM prompts and completions efficiently in the UI, and processing terabytes of data per day through our ingestion pipeline.\n\n - You'll work closely with the ClickHouse team and learn how they build a world-class infrastructure company. We're in a period of strong growth: Langfuse is growing organically and accelerating through ClickHouse's GTM. (Why we joined ClickHouse https://langfuse.com/blog/joining-clickhouse)\n\n - If you wonder what to build next, our users are a Slack message or a Github discussions post away.\n\n - You’re on a continuous learning journey. The AI space develops at breakneck speed and our customers are at the forefront. We need to be ready to meet them where they are and deliver the tools they need just-in-time."}},"shortDescription":"We're looking for a cloud infrastructure engineer to own and operate the platform behind the most widely adopted open source LLM engineering platform — keeping billion-trace-per-month infrastructure running fast, secure, and cost-efficient on AWS, ClickHouse Cloud, and Kubernetes, while making self-hosting effortless for thousands of teams, including 19 of the Fortune 50.","applicationFormDefinitionId":null,"surveyFormDefinitionIds":[],"linkedData":{"@context":"https://schema.org/","@type":"JobPosting","title":"Senior Cloud Infrastructure Engineer","description":"<h1><strong>About Langfuse</strong></h1><p style=\"min-height:1.5em\">Open Source LLM Engineering Platform that helps teams build useful AI applications via tracing, evaluation, and prompt management (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/0/82383757e54352130f65066e1b2fc4708aacab7897561bcb8000fe4c8a9c6a21?cache_buster=1761124921\"><u>mission</u></a>, <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://tracking.us.nylas.com/l/6d586a21a6fc4e1a8aacc7eb75882b72/1/b9fba3a93b6ffcc0f99ecda62767a17cc437fe8fe0b16181d1c43c1391212e3d?cache_buster=1761124921\"><u>product</u></a>). We are now part of ClickHouse.</p><p style=\"min-height:1.5em\">We're building the \"Datadog\" of this category; model capabilities continue to improve, but building useful applications is really hard, both in startups and enterprises.</p><p style=\"min-height:1.5em\">Largest open source solution in this category: trusted by 19 of the Fortune 50, &gt;2k customers, &gt;26M monthly SDK downloads, &gt;6M Docker pulls.</p><p style=\"min-height:1.5em\">We joined ClickHouse in January 2026 because LLM observability is fundamentally a data problem and Langfuse already ran on ClickHouse. Together we can move faster on product while staying true to open source and self-hosting, and join forces on GTM and sales to accelerate revenue.</p><p style=\"min-height:1.5em\">Previously backed by Y Combinator, Lightspeed, and General Catalyst.</p><p style=\"min-height:1.5em\">We're a small, engineering-heavy, and experienced team in Berlin and San Francisco. We are also hiring for engineering in EU timezones and expect one week per month in our Berlin office (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/principles\"><u>how we work</u></a>).</p><p style=\"min-height:1.5em\"></p><h2><strong>Why Cloud Infrastructure at Langfuse</strong></h2><p style=\"min-height:1.5em\"><strong>Your work will keep Langfuse running — everywhere.</strong></p><p style=\"min-height:1.5em\">Langfuse processes over a billion trace events per month. When a Fortune 50 company relies on Langfuse in production, they're relying on the infrastructure you operate. You'll own uptime, performance, and cost efficiency across our entire cloud footprint — and you'll make sure every self-hosted deployment runs just as smoothly.</p><p style=\"min-height:1.5em\">You'll operate Langfuse Cloud on AWS ECS Fargate and ClickHouse Cloud, with Datadog as the observability backbone. You'll also own our public self-hosted infrastructure — including our Helm chart, Docker Compose setup, and everything in between — so that teams from startups to enterprises can run Langfuse on their own terms.</p><p style=\"min-height:1.5em\">This isn't a \"maintain what exists\" role. We're scaling fast, and you'll be the person who makes sure the infrastructure grows ahead of demand — not behind it.</p><p style=\"min-height:1.5em\">Langfuse is now part of ClickHouse, which means the team behind the database at the core of our stack is one channel away. Few infrastructure roles give you that kind of direct access to the people who build your most critical dependency.</p><p style=\"min-height:1.5em\"></p><h2><strong>You will grow at Langfuse by</strong></h2><p style=\"min-height:1.5em\"><strong>Own Langfuse Cloud operations:</strong> You'll run our production environments on AWS ECS Fargate and ClickHouse Cloud. You'll manage deployments, autoscaling, capacity planning, and cost optimization — making sure we stay fast and affordable as traffic scales.</p><p style=\"min-height:1.5em\"><strong>Build world-class observability:</strong> You'll own our Datadog setup end to end — dashboards, alerts, and SLOs. When something degrades, you'll ensure we know before our customers do. You'll build the monitoring culture that lets the whole team ship with confidence.</p><p style=\"min-height:1.5em\"><strong>Make self-hosting effortless:</strong> Thousands of teams run Langfuse on their own infrastructure. You'll own and evolve our Helm chart, Docker Compose configuration, and deployment documentation. You'll turn \"works on my machine\" into \"works on every machine\" — from a single-node setup to a multi-region enterprise deployment.</p><p style=\"min-height:1.5em\"><strong>Automate everything:</strong> CI/CD pipelines, infrastructure-as-code, automated scaling, zero-downtime deployments. You'll replace manual processes with automation that makes the team faster and the platform more reliable.</p><p style=\"min-height:1.5em\"><strong>Scale for what's next:</strong> We're growing fast and new product directions — like complex long-running agent observability and real-time evaluation — push the infrastructure in new ways. You'll be thinking ahead about what breaks at 10x scale and building the foundation before we get there. 10x is always just one quarter away here at Langfuse.</p><p style=\"min-height:1.5em\"><strong>Harden security and compliance:</strong> As more enterprises adopt Langfuse, you'll help ensure our cloud and self-hosted deployments meet the security and compliance bar that large organizations require.</p><p style=\"min-height:1.5em\"></p><h2><strong>What we're looking for</strong></h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Strong infrastructure or SRE engineer who gets excited about running systems at scale and making them better every day</p></li><li><p style=\"min-height:1.5em\">Experience operating production workloads on AWS (ECS/Fargate, networking, IAM, S3, etc.) or on comparable hyperscale vendors.</p></li><li><p style=\"min-height:1.5em\">Comfortable with container orchestration — Kubernetes and/or ECS, Helm charts, Docker</p></li><li><p style=\"min-height:1.5em\">Experience with infrastructure-as-code (Terraform, Pulumi, CloudFormation, or similar)</p></li><li><p style=\"min-height:1.5em\">Strong monitoring and observability instincts — you've built dashboards and alerts that actually caught problems (Datadog experience is a plus)</p></li><li><p style=\"min-height:1.5em\">You organize yourself. You have strong opinions about reliability, automation, and how to ship infrastructure changes safely</p></li><li><p style=\"min-height:1.5em\">Interest in open source software and genuine enjoyment helping users debug their self-hosted deployments</p></li><li><p style=\"min-height:1.5em\">Thrives in a small, accountable team where your output is visible and matters</p></li><li><p style=\"min-height:1.5em\">CS or quantitative degree preferred</p></li></ul><p style=\"min-height:1.5em\"><strong>Bonus points:</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Experience with ClickHouse Cloud or other managed analytical databases</p></li><li><p style=\"min-height:1.5em\">Background in operating high-throughput event processing or observability infrastructure</p></li><li><p style=\"min-height:1.5em\">Contributions to open source infrastructure tooling (Helm charts, Terraform modules, etc.)</p></li><li><p style=\"min-height:1.5em\">Former founder</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Process</strong></h1><p style=\"min-height:1.5em\">We can run the full process to your offer letter in <strong>less than 7 days</strong> (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-hire/hiring-process\"><u>hiring process</u></a>).</p><p style=\"min-height:1.5em\"></p><h1><strong>Tech Stack</strong></h1><p style=\"min-height:1.5em\">We run a TypeScript monorepo: Next.js on the frontend, Express workers for background jobs, PostgreSQL for transactional data, ClickHouse for tracing at scale, S3 for file storage, and Redis for queues and caching. You should be familiar with a good chunk of this, but we trust you'll pick up the rest quickly (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/tech-stack\"><u>Stack</u></a>, <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/architecture\"><u>Architecture</u></a>).</p><p style=\"min-height:1.5em\"></p><h1><strong>How we ship</strong></h1><p style=\"min-height:1.5em\"><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/principles\"><u>Link to handbook</u></a></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>We trust you to take ownership (</strong><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/how-we-work/ownership\"><u>ownership overview</u></a><strong>)</strong> for your area. You identify what to build, propose solutions (RFCs), and ship them. Everyone here thinks about the user experience and the technical implementation at the same time. Everyone manages their own Linear.</p></li><li><p style=\"min-height:1.5em\"><strong>You're never alone.</strong> Anyone from the team is happy to go into a whiteboard session with you. 15 minutes of shared discussion can very much improve the overall output.</p></li><li><p style=\"min-height:1.5em\">We implement <strong>maker schedule and communication.</strong> There are two recurring meetings a week: Monday check-in on priorities (15 min) and a demo session on Fridays (60 min).</p></li><li><p style=\"min-height:1.5em\"><strong>Code reviews are mentorship.</strong> New joiners get all PRs reviewed to learn the codebase, patterns, and how the systems work (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/handbook/product-engineering/how-we-work/onboarding\"><u>onboarding guide</u></a>).</p></li><li><p style=\"min-height:1.5em\">We <strong>use AI</strong> as much as possible in our workflows to make our users happy. We encourage everyone to experiment with new tooling and AI workflows.</p></li></ul><p style=\"min-height:1.5em\"></p><h1><strong>Why Langfuse (now part of ClickHouse)</strong></h1><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">This role puts you at the forefront of the AI revolution, partnering with engineering teams who are building the technology that will define the next decade(s).</p></li><li><p style=\"min-height:1.5em\">This is an open-source devtools company. We ship daily, talk to customers constantly, and fight for great DX. Reliability and performance are central requirements.</p></li><li><p style=\"min-height:1.5em\">Your work ships under your name. You'll appear on <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/changelog\"><u>changelog posts</u></a> for the features you build, and during launch weeks, you'll <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/blog/2025-10-29-launch-week-4\"><u>produce videos</u></a> to announce what you've shipped to the community. You’ll own the full delivery end to end.</p></li><li><p style=\"min-height:1.5em\">We're solving hard engineering problems: figuring out which features actually help users improve AI product performance, building SDKs developers love, visualizing data-rich traces, rendering massive LLM prompts and completions efficiently in the UI, and processing terabytes of data per day through our ingestion pipeline.</p></li><li><p style=\"min-height:1.5em\">You'll work closely with the ClickHouse team and learn how they build a world-class infrastructure company. We're in a period of strong growth: Langfuse is growing organically and accelerating through ClickHouse's GTM. (<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://langfuse.com/blog/joining-clickhouse\"><u>Why we joined ClickHouse</u></a>)</p></li><li><p style=\"min-height:1.5em\">If you wonder what to build next, our users are a Slack message or a Github discussions post away.</p></li><li><p style=\"min-height:1.5em\">You’re on a continuous learning journey. The AI space develops at breakneck speed and our customers are at the forefront. We need to be ready to meet them where they are and deliver the tools they need just-in-time.</p></li></ul>","directApply":false,"identifier":{"@type":"PropertyValue","name":"Langfuse","value":"1bc2e248-89e7-41d7-b32f-08e9320eb5d0"},"datePosted":"2026-05-27","hiringOrganization":{"@type":"Organization","name":"Langfuse","sameAs":"https://langfuse.com/","logo":"https://app.ashbyhq.com/api/images/org-theme-logo/f6b22e97-ffee-421a-a0e6-c97d85c16c10/bde5e3cf-26f4-47cd-b1de-0897d21e3ce5/ffebe0df-34e9-4507-8588-77c4f7f56f78.png"},"jobLocation":{"@type":"Place","address":{"@type":"PostalAddress","addressCountry":"European Union"}},"employmentType":"FULL_TIME","baseSalary":{"@type":"MonetaryAmount","currency":"EUR","value":{"@type":"QuantitativeValue","minValue":90000,"maxValue":160000,"unitText":"YEAR"}},"jobLocationType":"TELECOMMUTE","applicantLocationRequirements":[{"@type":"Country","name":"Germany"},{"@type":"Country","name":"France"},{"@type":"Country","name":"Switzerland"},{"@ty
