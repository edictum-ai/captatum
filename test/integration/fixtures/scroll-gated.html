<!DOCTYPE html><html><head><meta charset="utf-8"><title>Conference Talks</title></head>
<body><h1>Conference Talks</h1><ul id="feed"><li>Talk 01: Rust</li><li>Talk 10: Zig</li></ul>
<div id="sentinel" style="height:10px"></div>
<script>const more=["Talk 11: Elixir","Talk 30: OCaml"];const io=new IntersectionObserver(es=>{if(!es[0].isIntersecting)return;more.forEach(t=>{const li=document.createElement("li");li.textContent=t;feed.appendChild(li)});io.disconnect()});io.observe(sentinel)</script>
</body></html>
